# sesh recommended settings
set -g detach-on-destroy off   # land on another session instead of exiting tmux when you kill one
bind-key x kill-pane           # skip the y/n prompt
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g base-index 1
setw -g pane-base-index 1
set -g status-left-length 40

set -g history-limit 50000

set -g set-titles on
set -g set-titles-string "#{session_name}:#{window_name}"
set -g status-left "[#S] "
set -g allow-rename off
set -g automatic-rename off

set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g status 2
set -g status-style "bg=colour232"
set -g status-format[0] "#[fg=colour226][#S] #[fg=colour226] ⌘J picker  │  C-a c new window  │  C-a , rename  │  C-a s sessions  │  C-a x kill pane"
set -g status-format[1] "#[fg=colour244] C-a 1/2/3 switch window  │  C-a n/p next/prev  │  C-a d detach  │  C-a L last session"

# open sesh picker with prefix+T
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
