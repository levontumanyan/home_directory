fail_fast: true
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
-   repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
    -   id: shellcheck
        types: [shell]
        files: \.sh$
-   repo: local
    hooks:
    -   id: zsh-syntax-check
        name: zsh syntax check
        entry: zsh -n
        language: system
        files: \.zsh$
-   repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
    -   id: shfmt
-   repo: local
    hooks:
    -   id: dotfiles-test
        name: Run Dotfiles Container Test
        entry: make test
        language: system
        files: ^(install\.sh|scripts/test\.sh|dotfiles/.*|Makefile)$
        exclude: \.md$
        pass_filenames: false
    -   id: dump-brewfile
        name: Dump Brewfile
        entry: ./scripts/dump_brewfile.sh
        language: system
        always_run: true
        pass_filenames: false
